<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Smallwoods — Browser RPG</title>
    <style>
      :root {
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
        --bottom-chrome-height: 0px;
        --chat-messages-height: 96px;
        --bg: #1a1a2e;
        --card: #242442;
        --accent: #5a8a5a;
        --accent-hover: #6faa6f;
        --text: #f0f0f0;
        --muted: #aaaaaa;
        --error: #ff8a8a;
        --success: #a8d8a8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        touch-action: none;
        font-family: system-ui, sans-serif;
        color: var(--text);
      }

      #game-container {
        width: 100%;
        height: 100%;
      }

      /* Auth overlay */
      #auth-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 20, 0.92);
        padding: 16px;
        overflow-y: auto;
        touch-action: auto;
        -webkit-user-select: text;
        user-select: text;
      }

      #auth-overlay.hidden {
        display: none;
      }

      .auth-card {
        width: 100%;
        max-width: 400px;
        background: var(--card);
        border: 1px solid #3a3a5a;
        border-radius: 12px;
        padding: 24px 20px;
      }

      @media (max-width: 430px) {
        #auth-overlay {
          padding: 12px;
          align-items: flex-start;
          padding-top: max(16px, var(--safe-area-top));
        }

        .auth-card {
          padding: 20px 16px;
        }

        .auth-card h1 {
          font-size: 1.5rem;
        }
      }

      .auth-card h1 {
        font-size: 1.75rem;
        margin-bottom: 4px;
      }

      .auth-subtitle {
        color: var(--muted);
        margin-bottom: 20px;
        font-size: 0.95rem;
      }

      .auth-notice {
        background: #3a3a1a;
        border: 1px solid #5a5a2a;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        line-height: 1.4;
      }

      .auth-notice code {
        background: #1a1a1a;
        padding: 1px 4px;
        border-radius: 3px;
      }

      .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .auth-tabs button {
        flex: 1;
        padding: 10px;
        border: 1px solid #4a4a6a;
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
      }

      .auth-tabs button.active {
        background: var(--accent);
        border-color: var(--accent);
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 12px;
      }

      .auth-form label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .auth-form input {
        padding: 12px 14px;
        font-size: 16px;
        border: 1px solid #4a4a6a;
        border-radius: 8px;
        background: #1a1a30;
        color: var(--text);
      }

      .auth-form button[type='submit'],
      .auth-secondary {
        padding: 14px;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }

      .auth-form button[type='submit'] {
        background: var(--accent);
        color: white;
      }

      .auth-form button[type='submit']:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .auth-form button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .auth-secondary {
        width: 100%;
        background: transparent;
        border: 1px solid #4a4a6a;
        color: var(--muted);
      }

      .auth-error {
        background: #4a2020;
        color: var(--error);
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 0.9rem;
      }

      .auth-success {
        background: #204a20;
        color: var(--success);
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 0.9rem;
      }

      .hidden {
        display: none !important;
      }

      /* Chat panel */
      #chat-root {
        position: fixed;
        left: var(--safe-area-left);
        right: var(--safe-area-right);
        bottom: var(--safe-area-bottom);
        z-index: 9000;
        pointer-events: none;
        touch-action: manipulation;
        -webkit-user-select: text;
        user-select: text;
      }

      .chat-panel {
        pointer-events: auto;
        touch-action: manipulation;
        margin: 0 0 8px 10px;
        max-width: min(320px, 58vw);
        background: rgba(0, 0, 0, 0.82);
        border: 1px solid #444;
        border-radius: 10px;
        overflow: hidden;
      }

      .chat-panel.chat-collapsed .chat-messages,
      .chat-panel.chat-collapsed .chat-form {
        display: none;
      }

      .chat-panel.chat-disabled {
        opacity: 0.6;
      }

      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: #2a2a2a;
        font-family: monospace;
        font-size: 12px;
        color: #ccc;
        min-height: 32px;
      }

      .chat-header button {
        background: transparent;
        border: none;
        color: #ccc;
        font-size: 18px;
        cursor: pointer;
        padding: 0 6px;
        line-height: 1;
      }

      .chat-messages {
        height: var(--chat-messages-height);
        max-height: 22vh;
        overflow-y: auto;
        padding: 6px 10px;
        font-family: monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      .chat-line {
        margin-bottom: 4px;
        word-break: break-word;
      }

      .chat-line strong {
        color: #9ecfff;
      }

      .chat-system {
        color: #888;
        font-style: italic;
      }

      .chat-form {
        display: flex;
        gap: 6px;
        padding: 6px;
        border-top: 1px solid #333;
      }

      .chat-form input {
        flex: 1;
        min-width: 0;
        padding: 8px 10px;
        font-size: 16px;
        border: 1px solid #444;
        border-radius: 8px;
        background: #1a1a1a;
        color: white;
        touch-action: manipulation;
      }

      .chat-form button {
        padding: 8px 12px;
        font-size: 13px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .chat-form button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      @media (min-width: 600px) {
        .chat-panel {
          margin: 0 12px 12px;
          max-width: 420px;
          margin-left: auto;
        }

        :root {
          --chat-messages-height: 120px;
        }
      }

      @media (max-height: 520px), (orientation: landscape) and (max-height: 500px) {
        :root {
          --chat-messages-height: 52px;
        }

        .chat-panel {
          max-width: min(260px, 48vw);
        }

        .chat-header {
          padding: 4px 8px;
          min-height: 28px;
          font-size: 11px;
        }

        .chat-form input,
        .chat-form button {
          padding: 6px 8px;
        }
      }

      @media (max-width: 375px) {
        .chat-panel {
          max-width: min(240px, 62vw);
          margin-left: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="auth-overlay" class="hidden"></div>
    <div id="game-container"></div>
    <div id="chat-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
